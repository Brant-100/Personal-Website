name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  # Frontend: build + lint                                             #
  # ------------------------------------------------------------------ #
  client-build:
    name: Client (Node 20): build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  # ------------------------------------------------------------------ #
  # API: ruff lint + pytest                                            #
  # ------------------------------------------------------------------ #
  api-test:
    name: API (Python 3.11): ruff & pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest tests/ -q
