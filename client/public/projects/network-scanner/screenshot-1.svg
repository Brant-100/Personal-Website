<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background:#0d1117;font-family:JetBrains Mono,monospace">
  <rect width="800" height="400" fill="#0d1117"/>
  <rect x="0" y="0" width="800" height="36" fill="#1a2332"/>
  <text x="400" y="22" fill="#888" font-size="11" text-anchor="middle">network-scanner CLI</text>
  <text x="20" y="70" fill="#00ffff" font-size="12">$ python main.py scan 192.168.1.1 -p 22,80,443,8080</text>
  <text x="20" y="98" fill="#22c55e" font-size="12">  22/tcp   OPEN   SSH     OpenSSH_8.9p1</text>
  <text x="20" y="118" fill="#22c55e" font-size="12">  80/tcp   OPEN   HTTP    Apache/2.4.54</text>
  <text x="20" y="138" fill="#22c55e" font-size="12">  443/tcp  OPEN   HTTPS   -</text>
  <text x="20" y="158" fill="#888" font-size="12">  8080/tcp CLOSED -</text>
  <text x="20" y="186" fill="#00ffff" font-size="12">$ python main.py discover 192.168.1.0/24 --json</text>
  <text x="20" y="210" fill="#a855f7" font-size="12">{"hosts": ["192.168.1.1","192.168.1.12","192.168.1.45"]}</text>
  <text x="20" y="350" fill="#888" font-size="10">[ PLACEHOLDER  replace with real terminal output capture ]</text>
</svg>
