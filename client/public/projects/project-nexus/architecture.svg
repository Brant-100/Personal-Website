<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" style="background:#0d1117;font-family:JetBrains Mono,monospace">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ffff"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="450" y="35" fill="#00ffff" font-size="16" font-weight="bold" text-anchor="middle">Project Nexus  Architecture (Placeholder)</text>
  <!-- Operator -->
  <rect x="30" y="80" width="160" height="60" rx="8" fill="#1a2332" stroke="#00ffff" stroke-width="1.5"/>
  <text x="110" y="106" fill="#e2f0f0" font-size="11" text-anchor="middle">Operator CLI</text>
  <text x="110" y="124" fill="#888" font-size="9" text-anchor="middle">JWT auth</text>
  <!-- FastAPI Server -->
  <rect x="360" y="80" width="180" height="60" rx="8" fill="#1a2332" stroke="#00ffff" stroke-width="1.5"/>
  <text x="450" y="106" fill="#e2f0f0" font-size="11" text-anchor="middle">FastAPI Operator Server</text>
  <text x="450" y="124" fill="#888" font-size="9" text-anchor="middle">REST · rate limiting · sessions</text>
  <!-- SQLite WAL -->
  <rect x="360" y="220" width="180" height="60" rx="8" fill="#1a2332" stroke="#a855f7" stroke-width="1.5"/>
  <text x="450" y="246" fill="#e2f0f0" font-size="11" text-anchor="middle">SQLite WAL</text>
  <text x="450" y="264" fill="#888" font-size="9" text-anchor="middle">JSONL hash chain logs</text>
  <!-- Task Queue -->
  <rect x="360" y="360" width="180" height="60" rx="8" fill="#1a2332" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="386" fill="#e2f0f0" font-size="11" text-anchor="middle">Priority Task Queue</text>
  <text x="450" y="404" fill="#888" font-size="9" text-anchor="middle">17 handlers · configurable concurrency</text>
  <!-- Implant -->
  <rect x="700" y="220" width="160" height="60" rx="8" fill="#1a2332" stroke="#22c55e" stroke-width="1.5"/>
  <text x="780" y="246" fill="#e2f0f0" font-size="11" text-anchor="middle">Implant Beacon</text>
  <text x="780" y="264" fill="#888" font-size="9" text-anchor="middle">AES-GCM · jitter · sandbox detect</text>
  <!-- Arrows -->
  <line x1="190" y1="110" x2="355" y2="110" stroke="#00ffff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="140" x2="450" y2="215" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="280" x2="450" y2="355" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="545" y1="250" x2="695" y2="250" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="695" y1="250" x2="545" y2="250" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- PLACEHOLDER watermark -->
  <text x="450" y="470" fill="#333" font-size="11" text-anchor="middle">[ PLACEHOLDER  replace with Excalidraw export ]</text>
