<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-labelledby="flowTitle">
  <title id="flowTitle">Beacon and operator traffic flows</title>
  <defs>
    <linearGradient id="fb" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#fed7aa;stop-opacity:.5"/>
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:.45"/>
    </linearGradient>
  </defs>
  <rect width="720" height="280" rx="14" fill="url(#fb)" stroke="#cbd5e1"/>
  <text x="360" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Network flows</text>
  <!-- Row 1 beacon -->
  <rect x="40" y="60" width="120" height="56" rx="8" fill="#fff" stroke="#ea580c" stroke-width="2"/>
  <text x="100" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Agent</text>
  <text x="100" y="104" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">jitter sleep</text>
  <path d="M168 88 L480 88" stroke="#0284c7" stroke-width="2.5" fill="none"/>
  <polygon points="474,82 490,88 474,94" fill="#0284c7"/>
  <text x="320" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#0369a1">HTTP(S) POST /beacon · JSON + AES-GCM</text>
  <rect x="500" y="60" width="180" height="56" rx="8" fill="#fff" stroke="#0284c7" stroke-width="2"/>
  <text x="590" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Team server</text>
  <text x="590" y="104" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">tasks + exfil</text>
  <!-- Row 2 operator -->
  <rect x="40" y="160" width="120" height="56" rx="8" fill="#fff" stroke="#9333ea" stroke-width="2"/>
  <text x="100" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Operator</text>
  <text x="100" y="204" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">authenticated</text>
  <path d="M168 188 L480 188" stroke="#9333ea" stroke-width="2.5" fill="none"/>
  <polygon points="474,182 490,188 474,194" fill="#9333ea"/>
  <text x="320" y="178" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#7c3aed">REST / automation</text>
  <rect x="500" y="160" width="180" height="56" rx="8" fill="#fff" stroke="#0284c7" stroke-width="2"/>
  <text x="590" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Team server</text>
  <text x="590" y="204" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">campaign mgmt</text>
  <!-- Foot -->
  <text x="360" y="246" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">TLS metadata timing and sizes remain visible  intentional for defender training.</text>
</svg>
