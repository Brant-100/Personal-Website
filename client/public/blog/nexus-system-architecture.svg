<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-labelledby="archTitle">
  <title id="archTitle">Project Nexus containerized system architecture</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:.12"/>
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:.1"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#0284c7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="880" height="400" rx="14" fill="url(#bg)" stroke="#94a3b8" stroke-opacity=".4"/>
  <text x="440" y="34" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">System architecture (lab)</text>
  <rect x="28" y="56" width="824" height="316" rx="10" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="44" y="78" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">Docker network</text>
  <rect x="56" y="130" width="168" height="96" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <text x="140" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#0f172a">Nexus agents</text>
  <text x="140" y="184" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#475569">Python, outbound</text>
  <text x="140" y="204" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">modular loop</text>
  <rect x="312" y="110" width="256" height="136" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="440" y="144" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Team server</text>
  <text x="440" y="166" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#0369a1">FastAPI</text>
  <text x="440" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#475569">agent + operator APIs</text>
  <text x="440" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">POST /beacon, AES-GCM JSON</text>
  <rect x="352" y="268" width="176" height="72" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="440" y="298" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0f172a">State store</text>
  <text x="440" y="318" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">SQLite to PostgreSQL</text>
  <rect x="56" y="262" width="168" height="72" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="140" y="296" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0f172a">Zeek sidecar</text>
  <text x="140" y="316" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">conn.log, http.log</text>
  <rect x="656" y="120" width="176" height="200" rx="10" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="744" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#0f172a">ELK stack</text>
  <text x="744" y="176" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#64748b">Logstash to ES</text>
  <text x="744" y="198" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#64748b">Kibana</text>
  <text x="744" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#475569">hunts, dashboards, time series</text>
  <line x1="224" y1="178" x2="308" y2="178" stroke="#0284c7" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="266" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#0369a1">HTTPS</text>
  <line x1="568" y1="178" x2="648" y2="178" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4 3" opacity=".85"/>
  <text x="608" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#a16207">logs</text>
  <line x1="440" y1="246" x2="440" y2="266" stroke="#9333ea" stroke-width="2"/>
  <line x1="140" y1="226" x2="140" y2="258" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
</svg>
