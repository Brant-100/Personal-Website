  <circle cx="632" cy="118" r="5" fill="#cbd5e1" stroke="#64748b"/>
  <text x="360" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Dependency-driven releases: validate core, then expand routing, GUI, integrations, evasion, GTM</text>
