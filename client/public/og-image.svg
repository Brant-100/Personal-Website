  <rect x="368" y="335" width="180" height="32" rx="6" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="458" y="357" fill="#22c55e" font-size="13" text-anchor="middle">18 MITRE techniques</text>
